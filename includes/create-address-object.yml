---
- name: Determine if source and destination IPs are host or network
  ansible.builtin.set_fact:
    source_is_host: "{{ '/' not in address or address.endswith('/32') }}"
    source_is_network: "{{ '/' in address and not address.endswith('/32') }}"

- name: Set source host address object name
  ansible.builtin.set_fact:
    address_object_name: "ip_{{ address | replace('/','_') }}"
  when: source_is_host

- name: Set source network address object name
  ansible.builtin.set_fact:
    address_object_name: "net_{{ address | replace('/','_') }}"
  when: source_is_network

- name: Set source host address value
  ansible.builtin.set_fact:
    address_object_value: "{{ address }}"
  when: source_is_host or source_is_network

- name: CREATE NETWORK OBJECT
  paloaltonetworks.panos.panos_address_object:
    provider: "{{ provider }}"
    name: "{{ address_object_name }}"
    value: "{{ address_object_value }}"
    device_group: shared

- name: Get address objects from Panorama again after creating missing objects
  paloaltonetworks.panos.panos_address_object:
    provider: "{{ provider }}"
    state: gathered
    gathered_filter: "*"
  register: gathered_address_objects
