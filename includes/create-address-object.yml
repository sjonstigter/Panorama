---
- name: Set source host address object name
  ansible.builtin.set_fact:
    address_object_name: "ip_{{ source_address | replace('/','_') }}"
  when: source_is_host

- name: Set source network address object name
  ansible.builtin.set_fact:
    address_object_name: "net_{{ source_address | replace('/','_') }}"
  when: source_is_network

#- name: Set destination host address object name
#  ansible.builtin.set_fact:
#    address_object_name: "ip_{{ destination_address | replace('/','_') }}"
- name: Set destination host address object name
  ansible.builtin.set_fact:
    address_object_name: >-
      {{
        (destination_name | default('') | trim | length > 0)
        | ternary(
            destination_name ~ ' - ' ~ (destination_address | replace('/', '_')),
            'ip_' ~ (destination_address | replace('/', '_'))
          )
      }}
  when: destination_is_host

- name: Set destination network address object name
  ansible.builtin.set_fact:
    address_object_name: "net_{{ destination_address | replace('/','_') }}"
  when: destination_is_network

- name: Set source host address value
  ansible.builtin.set_fact:
    address_object_value: "{{ source_address }}"
  when: source_is_host or source_is_network

- name: Set destination host address value
  ansible.builtin.set_fact:
    address_object_value: "{{ destination_address }}"
  when: destination_is_host or destination_is_network

- name: Check whether address_objects.yaml exists
  ansible.builtin.stat:
    path: "{{ address_objects_file }}"
  register: address_objects_file_stat
  delegate_to: terraform.zero-days.nl

- name: Read address_objects.yaml if present
  ansible.builtin.slurp:
    src: "{{ address_objects_file }}"
  register: address_objects_file_raw
  when: address_objects_file_stat.stat.exists
  delegate_to: terraform.zero-days.nl

- name: Parse existing YAML content
  ansible.builtin.set_fact:
    address_objects_data: >-
      {{
        (address_objects_file_raw.content | b64decode | from_yaml)
        if address_objects_file_stat.stat.exists
        else {'address_objects': []}
      }}

- name: Define desired source address object
  ansible.builtin.set_fact:
    new_address_object:
      name: "{{ address_object_name }}"
      value: "{{ address_object_value }}"
      type: "{{ source_address_type | default('ip-netmask') }}"
      description: "{{ source_address_description | default('Managed by AWX') }}"

- name: Merge address object into address object list
  ansible.builtin.set_fact:
    merged_address_objects: >-
      {{
        (
          address_objects_data.address_objects
          | rejectattr('name', 'equalto', new_address_object.name)
          | list
        )
        + [new_address_object]
      }}

- name: Build updated address objects data
  ansible.builtin.set_fact:
    updated_address_objects_data:
      address_objects: "{{ merged_address_objects }}"

- name: Write address_objects.yaml
  ansible.builtin.copy:
    dest: "{{ address_objects_file }}"
    content: "{{ updated_address_objects_data | to_nice_yaml(indent=2, sort_keys=False) }}"
    mode: "0644"
  delegate_to: terraform.zero-days.nl

- name: Run terraform init
  ansible.builtin.command: terraform init
  args:
    chdir: "{{ terraform_root }}"
  delegate_to: terraform.zero-days.nl

- name: Run terraform plan
  ansible.builtin.command: terraform plan -out=tfplan
  args:
    chdir: "{{ terraform_root }}"
  delegate_to: terraform.zero-days.nl

- name: Run terraform apply
  ansible.builtin.command: terraform apply -auto-approve tfplan
  args:
    chdir: "{{ terraform_root }}"
  delegate_to: terraform.zero-days.nl

# Turn to lookup module
- name: Run lookup again to get address objects from Panorama
  paloaltonetworks.panos.panos_address_object:
    provider: "{{ provider }}"
    state: 'gathered'
    gathered_filter: '*'
  register: gathered_address_objects

- name: Find firewall source object based on input variable - Search for address object
  ansible.builtin.set_fact:
    source_address_object: >-
      {{ gathered_address_objects.gathered
        | selectattr('value', 'search', source_address)
        | map(attribute='name')
        | list }}

- name: Find firewall destination object based on input variable - Search for address object
  ansible.builtin.set_fact:
    destination_address_object: >-
      {{ gathered_address_objects.gathered
        | selectattr('value', 'search', destination_address)
        | map(attribute='name')
        | list }}
