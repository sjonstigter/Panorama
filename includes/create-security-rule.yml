---
- name: Set security policy rule name
  ansible.builtin.set_fact:
    rule_name: "{{ source_address_object[0].split(' - ')[0] }} to {{ destination_address_object[0].split(' - ')[0] }} - {{ service_object }}"

- name: Ensure policies directory exists
  ansible.builtin.file:
    path: "{{ policies_dir }}"
    state: directory
    mode: "0755"
  delegate_to: terraform.zero-days.nl

- name: Check whether policy file exists
  ansible.builtin.stat:
    path: "{{ policy_file }}"
  register: policy_file_stat
  delegate_to: terraform.zero-days.nl

- name: Read policy file if present
  ansible.builtin.slurp:
    src: "{{ policy_file }}"
  register: policy_file_raw
  when: policy_file_stat.stat.exists
  delegate_to: terraform.zero-days.nl

- name: Parse existing YAML content
  ansible.builtin.set_fact:
    policy_data: >-
      {{
        (policy_file_raw.content | b64decode | from_yaml)
        if policy_file_stat.stat.exists
        else {
          'group_tag': group_tag,
          'position_keyword': (rulebase_position_keyword | default('bottom')),
          'rules': []
        }
      }}

- name: Define desired firewall rule
  ansible.builtin.set_fact:
    new_rule:
      name: "{{ rule_name }}"
      description: "{{ description }}"
      device_group: "{{ device_group | flatten | first }}"
      source_zones: "{{ [source_zones] }}"
      source_addresses:
        "{{ source_address_object }}"
      source_users: "{{ source_users | default(['any']) }}"
      destination_zones: "{{ [destination_zones] }}"
      destination_addresses:
        "{{ destination_address_object }}"
      applications: "{{ applications | default(['any']) }}"
      services:
        "{{ service_object }}"
      categories: "{{ categories | default(['any']) }}"
      tags: "{{ tags | default(['sddc - automated']) }}"
      group: "{{ group | default(['any']) }}"
      log_setting: "{{ log_setting | default('forward-to-panorama') }}"
      action: "{{ action }}"

- name: Merge rule into policy rules list
  ansible.builtin.set_fact:
    merged_rules: >-
      {{
        (
          policy_data.rules
          | rejectattr('name', 'equalto', new_rule.name)
          | list
        )
        + [new_rule]
      }}

- name: Build updated policy data
  ansible.builtin.set_fact:
    updated_policy_data:
      group_tag: "{{ group_tag }}"
      # position_keyword: "{{ rulebase_position_keyword | default(policy_data.position_keyword | default('bottom')) }}"
      rules: "{{ merged_rules }}"

- name: Write policy file
  ansible.builtin.copy:
    dest: "{{ policy_file }}"
    content: >-
      {{
        updated_policy_data
        | to_nice_yaml(indent=2, sort_keys=False)
        | regex_replace('\n- name:', '\n\n- name:')
      }}
    mode: "0644"
  delegate_to: terraform.zero-days.nl

- name: Run terraform init
  ansible.builtin.command: terraform init
  args:
    chdir: "{{ terraform_root }}"
  delegate_to: terraform.zero-days.nl

- name: Run terraform plan
  ansible.builtin.command: terraform plan -out=tfplan
  args:
    chdir: "{{ terraform_root }}"
  delegate_to: terraform.zero-days.nl

- name: Run terraform apply
  ansible.builtin.command: terraform apply -auto-approve tfplan
  args:
    chdir: "{{ terraform_root }}"
  delegate_to: terraform.zero-days.nl
