---
- name: Determine if source and destination IPs are host or network
  ansible.builtin.set_fact:
    source_is_host: "{{ '/' not in rule.source_address or rule.source_address.endswith('/32') }}"
    source_is_network: "{{ '/' in rule.source_address and not rule.source_address.endswith('/32') }}"
    destination_is_host: "{{ '/' not in rule.destination_address or rule.destination_address.endswith('/32') }}"
    destination_is_network: "{{ '/' in rule.destination_address and not rule.destination_address.endswith('/32') }}"

- name: Find network for host source IP
  ansible.builtin.uri:
    url: "https://{{ infoblox_host }}/wapi/{{ infoblox_wapi_version }}/network?network_view=default&contains_address={{ rule.source_address | regex_replace('/32$', '') }}&_return_fields=network"
    method: GET
    user: "{{ infoblox_username }}"
    password: "{{ infoblox_password }}"
    force_basic_auth: true
    validate_certs: false
    return_content: true
  register: ib_network_lookup_src
  when: source_is_host | bool

- name: Find network for host destination IP
  ansible.builtin.uri:
    url: "https://{{ infoblox_host }}/wapi/{{ infoblox_wapi_version }}/network?network_view=default&contains_address={{ rule.destination_address | regex_replace('/32$', '') }}&_return_fields=network"
    method: GET
    user: "{{ infoblox_username }}"
    password: "{{ infoblox_password }}"
    force_basic_auth: true
    validate_certs: false
    return_content: true
  register: ib_network_lookup_dst
  when: destination_is_host | bool

- name: Set source_zones - Match source_zones from subnet list and overwrite standard source_zones and type
  ansible.builtin.set_fact:
    source_zone: "{{ item.zone }}"
    network_source_type: "{{ item.type }}"
  loop: "{{ subnet_classes }}"
  when: item.cidr | ansible.utils.network_in_network(rule.source_address)

- name: Set destination_zones - Match destination_zones from subnet list and overwrite standard destination_zones and type
  ansible.builtin.set_fact:
    destination_zone: "{{ item.zone }}"
    network_destination_type: "{{ item.type }}"
  loop: "{{ subnet_classes }}"
  when: item.cidr | ansible.utils.network_in_network(rule.destination_address)

- name: Determine device_group based on network type from subnet_classes
  # Note sg_name vs ss-name (underscore) when setting final device_group names
  ansible.builtin.set_fact:
    device_group: >-
      {%- set pair = [network_source_type, network_destination_type] | sort -%}
      {%- if pair == ['external', 'internal'] -%}
      ['ss-external']
      {%- elif pair == ['internal', 'internal'] -%}
      ['ss-internal']
      {%- elif pair == ['azure', 'internal'] -%}
      ['ss-external', 'ss-azure']
      {%- elif pair == ['azure', 'azure'] -%}
      ['ss-azure']
      {%- elif pair == ['external', 'azure'] -%}
      ['ss-azure']
      {%- else -%}
      ['ERR-DG-NOT-FOUND-OR-INVALID']
      {%- endif -%}

- name: Add resolved row to firewall_rules_resolved
  ansible.builtin.set_fact:
    firewall_rules_resolved: >-
      {{
        firewall_rules_resolved | default([]) +
        [
          rule | combine({
            'source_address': resolved_source_address,
            'destination_address': resolved_destination_address,
            'source_zone': resolved_source_zone,
            'destination_zone': resolved_destination_zone
            'device_group': device_group
          })
        ]
      }}
  vars:
    resolved_source_address: >-
      {{
        (
          ib_network_lookup_src.json[0].network
          if
            source_is_host | bool
            and ib_network_lookup_src is defined
            and not ib_network_lookup_src.skipped | default(false)
            and ib_network_lookup_src.json | default([]) | length > 0
          else
            rule.source_address
        )
      }}
    resolved_destination_address: >-
      {{
        (
          ib_network_lookup_dst.json[0].network
          if
            destination_is_host | bool
            and ib_network_lookup_dst is defined
            and not ib_network_lookup_dst.skipped | default(false)
            and ib_network_lookup_dst.json | default([]) | length > 0
          else
            rule.destination_address
        )
      }}
    resolved_source_zone: >-
      {{
        (
          source_zone
          if
            source_zone is defined
            and source_zone | default([]) | length > 0
          else
            'sddc-external'
        )
      }}
    resolved_destination_zone: >-
      {{
        (
          destination_zone
          if
            destination_zone is defined
            and destination_zone | default([]) | length > 0
          else
            'sddc-external'
        )
      }}

- name: Show resolved rules
  ansible.builtin.debug:
    var: firewall_rules_resolved
