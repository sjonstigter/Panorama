- name: Get address objects from Panorama
  paloaltonetworks.panos.panos_address_object:
    provider: "{{ provider }}"
    state: 'gathered'
    gathered_filter: '*'
  register: gathered_address_objects

- name: Find firewall source object based on input variable [1/2] - Search for address object
  ansible.builtin.set_fact:
    source_address_object: >-
      {{ gathered_address_objects.gathered
        | selectattr('value', 'search', source_address)
        | map(attribute='name')
        | list }}

- name: Find firewall source object based on input variable [2/2] - Create address object if none was found
  ansible.builtin.include_tasks: includes/create-address-object.yml
  when: source_address_object | length == 0
  vars:
    terraform_root: "/home/sstigter/panorama"
    address_objects_file: "{{ terraform_root }}/address_objects.yaml"

- name: Find firewall destination object based on input variable [1/2] - Search for address object
  ansible.builtin.set_fact:
    destination_address_object: >-
      {{ gathered_address_objects.gathered
        | selectattr('value', 'search', destination_address)
        | map(attribute='name')
        | list }}

- name: Find firewall destination object based on input variable [2/2] - Create address object if none was found
  ansible.builtin.include_tasks: includes/create-address-object.yml
  when: destination_address_object | length == 0
  vars:
    terraform_root: "/home/sstigter/panorama"
    address_objects_file: "{{ terraform_root }}/address_objects.yaml"

- name: Show source address object
  ansible.builtin.debug:
    var: source_address_object
  when: debug

- name: Show destination address object
  ansible.builtin.debug:
    var: destination_address_object
  when: debug

- name: Get service objects from Panorama
  paloaltonetworks.panos.panos_service_object:
    provider: "{{ provider }}"
    state: 'gathered'
    gathered_filter: '*'
  register: gathered_service_objects

- name: Show service destination ports
  ansible.builtin.debug:
    var: service_destination_port

- name: NEW Determine existing ports - get list of all ports per protocol
  ansible.builtin.set_fact:
    existing_ports: >-
      {{
        gathered_service_objects.gathered
        | selectattr('protocol', 'equalto', service_protocol)
        | map(attribute='destination_port')
        | list
      }}

- name: NEW Determine missing ports - compare service_destination_port to existing_ports
  ansible.builtin.set_fact:
    missing_ports: >-
      {{
        service_destination_port | map('string') | difference(existing_ports)
      }}

- name: NEW Create missing service objects - loop through missing_ports we might have
  ansible.builtin.include_tasks: includes/create-service-object.yml
  loop: "{{ missing_ports }}"
  loop_control:
    loop_var: port
  vars:
    terraform_root: "/home/sstigter/panorama"
    services_file: "{{ terraform_root }}/services.yaml"
    service_destination_port: "{{ port }}"

- name: NEW Build final service_object list -EXPL
  ansible.builtin.set_fact:
    service_object: "{{ service_destination_port | map('string') | map('regex_replace', '^', service_protocol ~ '-') | list }}"

- name: Create security rule
  ansible.builtin.include_tasks: includes/create-security-rule.yml
  vars:
    terraform_root: "/home/sstigter/panorama"
    policies_dir: "{{ terraform_root }}/policies"
    policy_file: "{{ policies_dir }}/{{ group_tag }}.yaml"
