---
# Source Address function
- name: Get address objects from Panorama
  paloaltonetworks.panos.panos_address_object:
    provider: "{{ provider }}"
    state: gathered
    gathered_filter: "*"
  register: gathered_address_objects

- name: Build requested source objects
  ansible.builtin.set_fact:
    requested_sources: >-
      {{
        rule.sources
        | unique(attribute='address')
        | list
      }}

- name: Build list of existing Panorama address object values
  ansible.builtin.set_fact:
    existing_address_values: >-
      {{
        gathered_address_objects.gathered
        | map(attribute='value')
        | list
      }}

- name: Determine missing source objects
  ansible.builtin.set_fact:
    missing_sources: >-
      {{
        requested_sources
        | rejectattr('address', 'in', existing_address_values)
        | list
      }}

- name: Create missing source address objects
  ansible.builtin.include_tasks: includes/create-address-object.yml
  loop: "{{ missing_sources }}"
  loop_control:
    loop_var: source
    label: "{{ source.name | default(source.address) }}"

- name: Re-gather address objects from Panorama after source creation
  paloaltonetworks.panos.panos_address_object:
    provider: "{{ provider }}"
    state: gathered
    gathered_filter: "*"
  register: gathered_address_objects

- name: Build address value to object name map
  ansible.builtin.set_fact:
    address_object_map: >-
      {{
        address_object_map | default({}) |
        combine({
          item.value: item.name
        })
      }}
  loop: "{{ gathered_address_objects.gathered }}"
  loop_control:
    label: "{{ item.name }}"

- name: Build resolved source address object names
  ansible.builtin.set_fact:
    resolved_source_addresses: >-
      {{
        rule.sources
        | map(attribute='address')
        | map('extract', address_object_map)
        | list
      }}

# Destination Address function
- name: Build requested destination objects
  ansible.builtin.set_fact:
    requested_destinations: >-
      {{
        rule.destinations
        | unique(attribute='address')
        | list
      }}

- name: Build list of existing Panorama address object values
  ansible.builtin.set_fact:
    existing_address_values: >-
      {{
        gathered_address_objects.gathered
        | map(attribute='value')
        | list
      }}

- name: Determine missing destination objects
  ansible.builtin.set_fact:
    missing_destinations: >-
      {{
        requested_destinations
        | rejectattr('address', 'in', existing_address_values)
        | list
      }}

- name: Create missing destination address objects
  ansible.builtin.include_tasks: includes/create-address-object.yml
  loop: "{{ missing_destinations }}"
  loop_control:
    loop_var: destination
    label: "{{ destination.name | default(destination.address) }}"

- name: Re-gather address objects from Panorama after destination creation
  paloaltonetworks.panos.panos_address_object:
    provider: "{{ provider }}"
    state: gathered
    gathered_filter: "*"
  register: gathered_address_objects

- name: Reset address value to object name map
  ansible.builtin.set_fact:
    address_object_map: {}

- name: Build address value to object name map
  ansible.builtin.set_fact:
    address_object_map: >-
      {{
        address_object_map | default({}) |
        combine({
          item.value: item.name
        })
      }}
  loop: "{{ gathered_address_objects.gathered }}"
  loop_control:
    label: "{{ item.name }}"

- name: Build resolved destination address object names
  ansible.builtin.set_fact:
    resolved_destination_addresses: >-
      {{
        rule.destinations
        | map(attribute='address')
        | map('extract', address_object_map)
        | list
      }}

# Service object functions
- name: Normalise input values for service ports
  ansible.builtin.set_fact:
    normalised_service_destination_ports: >-
      {{
        rule.service_destination_ports[0] | from_yaml
        if
          rule.service_destination_ports | length == 1
          and rule.service_destination_ports[0] is string
          and rule.service_destination_ports[0].startswith('[')
        else
          rule.service_destination_ports
      }}
    normalised_service_protocol: "{{ rule.service_protocol }}"

- name: Get service objects from Panorama
  paloaltonetworks.panos.panos_service_object:
    provider: "{{ provider }}"
    state: gathered
    gathered_filter: "*"
  register: gathered_service_objects

- name: Determine existing ports - Build list of all ports per defined protocol
  ansible.builtin.set_fact:
    existing_ports: >-
      {{
        gathered_service_objects.gathered
        | selectattr('protocol', 'equalto', normalised_service_protocol)
        | map(attribute='destination_port')
        | map('string')
        | list
      }}

- name: Determine missing ports - compare service destination ports to existing ports
  ansible.builtin.set_fact:
    missing_ports: >-
      {{
        normalised_service_destination_ports
        | map('string')
        | difference(existing_ports)
      }}

- name: Create missing service objects
  ansible.builtin.include_tasks: includes/create-service-object.yml
  loop: "{{ missing_ports }}"
  loop_control:
    loop_var: port
    label: "{{ normalised_service_protocol }}-{{ port }}"
  vars:
    service_protocol: "{{ normalised_service_protocol }}"

- name: Re-gather service objects from Panorama after service creation
  paloaltonetworks.panos.panos_service_object:
    provider: "{{ provider }}"
    state: gathered
    gathered_filter: "*"
  register: gathered_service_objects

- name: Build service port to first service object name map
  ansible.builtin.set_fact:
    service_object_map: >-
      {{
        service_object_map | default({}) |
        combine({
          item.destination_port | string: item.name
        })
      }}
  loop: "{{ gathered_service_objects.gathered }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - item.protocol == normalised_service_protocol
    - item.destination_port | string not in (service_object_map | default({}))

- name: Build resolved service object names
  ansible.builtin.set_fact:
    resolved_services: >-
      {{
        normalised_service_destination_ports
        | map('string')
        | map('extract', service_object_map)
        | list
      }}

- name: Add resolved values to processed firewall rule list
  ansible.builtin.set_fact:
    processed_combined_firewall_rules: >-
      {{
        processed_combined_firewall_rules | default([]) +
        [
          rule | combine({
            'source_addresses': resolved_source_addresses,
            'destination_addresses': resolved_destination_addresses,
            'services': resolved_services
          })
        ]
      }}
