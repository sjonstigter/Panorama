---
- name: Add firewall rules
  hosts: "panorama"
  connection: local
  gather_facts: false
  vars_files:
   - vault/vault-fwrules.yml

  vars:
    group_tag: "myapp2"
    infoblox_host: infoblox.zero-days.nl
    infoblox_wapi_version: v2.12.3
    debug: true
    policy: false
    provider:
      ip_address: "{{ inventory_hostname }}"
      username: "{{ panorama_username }}"
      password: "{{ panorama_password }}"

    subnet_classes:
    - cidr: "10.0.0.0/8"
      zone: "sddc-external"
      type: "external"
    - cidr: "172.16.0.0/12"
      zone: "sddc-external"
      type: "external"
    - cidr: "10.220.0.0/16"
      zone: "sddc-external"
      type: "internal"
    - cidr: "10.221.0.0/16"
      zone: "sddc-internal"
      type: "internal"
    - cidr: "10.229.0.0/16"
      zone: "sddc-internal"
      type: "internal"
    - cidr: "10.205.0.0/16"
      zone: "private"
      type: "azure"
    - cidr: "10.226.0.0/16"
      zone: "private"
      type: "azure"
    - cidr: "10.227.0.0/16"
      zone: "private"
      type: "azure"
    - cidr: "10.53.80.0/20"
      zone: "sddc-oob"
      type: "external"
    - cidr: "192.168.0.0/16"
      zone: "sddc-internal"
      type: "internal"

  tasks:
    - name: Process firewall rules from JSON input
      ansible.builtin.include_tasks: includes/process-firewall-rule.yml
      loop: "{{ combined_firewall_rules }}"
      loop_control:
        loop_var: rule
        label: "row {{ rule.rows }} - {{ rule.description }}"
      vars:
        row: "{{ rule.rows }}"
        description: "{{ rule.description }}"
        source_ci: "{{ rule.source_ci }}"
        source_address: "{{ rule.source_address }}"
        source_name: "{{ rule.source_name }}"
        source_zone: "{{ rule.source_zone }}"
        group_id: "{{ rule.group_id }}"
        destination_ci: "{{ rule.destination_ci }}"
        destination_address: "{{ rule.destination_address }}"
        destination_name: "{{ rule.destination_name }}"
        destination_zone: "{{ rule.destination_zone }}"
        service: "{{ rule.service }}"
        service_protocol: "{{ rule.service_protocol | lower }}"
        service_destination_port: "{{ rule.service_destination_ports }}"
        device_group: "{{ rule.device_group }}"
        action: "{{ rule.action | lower }}"
