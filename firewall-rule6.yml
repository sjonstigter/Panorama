---
- name: Build firewall rulebase
  hosts: "panorama"
  connection: local
  gather_facts: false

  vars_files:
    - vault/vault-fwrules.yml

  vars:
    firewall_combine_mode: "{{ combine | default('none') }}"

    group_tag: "myapp2"
    infoblox_host: infoblox.zero-days.nl
    infoblox_wapi_version: v2.12.3
    debug: true
    policy: false

    provider:
      ip_address: "{{ inventory_hostname }}"
      username: "{{ panorama_username }}"
      password: "{{ panorama_password }}"

    subnet_classes:
      - cidr: "10.0.0.0/8"
        zone: "sddc-external"
        type: "external"
      - cidr: "172.16.0.0/12"
        zone: "sddc-external"
        type: "external"
      - cidr: "10.220.0.0/16"
        zone: "sddc-external"
        type: "internal"
      - cidr: "10.221.0.0/16"
        zone: "sddc-internal"
        type: "internal"
      - cidr: "10.229.0.0/16"
        zone: "sddc-internal"
        type: "internal"
      - cidr: "10.205.0.0/16"
        zone: "private"
        type: "azure"
      - cidr: "10.226.0.0/16"
        zone: "private"
        type: "azure"
      - cidr: "10.227.0.0/16"
        zone: "private"
        type: "azure"
      - cidr: "10.53.80.0/20"
        zone: "sddc-oob"
        type: "external"
      - cidr: "192.168.0.0/16"
        zone: "sddc-internal"
        type: "internal"

  tasks:
    - name: Resolve host IPs to Infoblox networks
      ansible.builtin.include_tasks: includes/resolve-firewall-row.yml
      loop: "{{ firewall_rules }}"
      loop_control:
        loop_var: rule
        label: "row {{ rule.row }}"

    - name: Build combined firewall rules using custom filter
      ansible.builtin.set_fact:
        combined_firewall_rules: >-
          {{
            firewall_rules_resolved
            | combine_firewall_rules(firewall_combine_mode)
          }}

    - name: Show firewall combine mode
      ansible.builtin.debug:
        var: firewall_combine_mode

    - name: Show resolved firewall rules
      ansible.builtin.debug:
        var: firewall_rules_resolved
      when: debug | bool

    - name: Show combined firewall rules
      ansible.builtin.debug:
        var: combined_firewall_rules

    - name: Set stat combined_firewall_rules
      ansible.builtin.set_stats:
        data:
          combined_firewall_rules: "{{ combined_firewall_rules }}"
