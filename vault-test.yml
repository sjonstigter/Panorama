---
- name: ansible-vault test playbook
  hosts: "panorama"
  connection: local
  gather_facts: false
  vars_files:
   - vault/vault-fwrules.yml

  vars:
    provider:
      ip_address: "{{ inventory_hostname }}"
      username: "{{ panorama_username }}"
      password: "{{ panorama_password }}"

  tasks:
    - name: Sample values
      ansible.builtin.set_fact:
        source_ip: "192.168.0.16/28"
        destination_ip: "10.221.7.1"

    - name: Determine if source and destination IPs are host or network
      ansible.builtin.set_fact:
        source_is_host: "{{ '/' not in source_ip or source_ip.endswith('/32') }}"
        source_is_network: "{{ '/' in source_ip and not source_ip.endswith('/32') }}"
        destination_is_host: "{{ '/' not in destination_ip or destination_ip.endswith('/32') }}"
        destination_is_network: "{{ '/' in destination_ip and not destination_ip.endswith('/32') }}" 

    - name: Find containing network for source IP
      ansible.builtin.uri:
        url: "https://infoblox.zero-days.nl/wapi/v2.12.3/network?network_view=default&contains_address={{ source_ip }}&_return_fields=network"
        method: GET
        user: "{{ infoblox_username }}"
        password: "{{ infoblox_password }}"
        force_basic_auth: true
        validate_certs: false
        return_content: true
      register: ib_network_lookup_src
      when: source_is_host

    - name: Find containing network for destination IP
      ansible.builtin.uri:
        url: "https://infoblox.zero-days.nl/wapi/v2.12.3/network?network_view=default&contains_address={{ destination_ip }}&_return_fields=network"
        method: GET
        user: "{{ infoblox_username }}"
        password: "{{ infoblox_password }}"
        force_basic_auth: true
        validate_certs: false
        return_content: true
      register: ib_network_lookup_dst
      when: destination_is_host

    - name: Show source value
      ansible.builtin.debug:
        var: ib_network_lookup_src.json[0].network

    - name: Show destination value
      ansible.builtin.debug:
        var: ib_network_lookup_dst.json[0].network

    - name: Find firewall object based on input variable [1/3] - Get address objects from Panorama
      paloaltonetworks.panos.panos_address_object:
        provider: "{{ provider }}"
        state: 'gathered'
        gathered_filter: '*'
      register: gathered_objects

    - name: Find firewall object based on input variable [2/3] - Search for address object
      ansible.builtin.set_fact:
        source_object: >-
          {{ gathered_objects.gathered
            | selectattr('value', 'search', source_ip)
            | map(attribute='name')
            | list }}

    - name: Find firewall object based on input variable [3/3] - Fail if no address object was found
      ansible.builtin.fail:
        msg: >-
          No Palo Alto address_object found matching '{{ source_ip }}'
      when: source_object | length == 0